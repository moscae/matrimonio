<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federica & Eugenio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --viola:#8C3A5D;
  --pesca:#F2B38A;
  --crema:#FFF8F2;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,var(--pesca),var(--crema));
  color:#2E2A26;
  overflow-x:hidden;
}

/* FIORI LATERALI ANIMATI */
.fiore{
  position:absolute;
  width:60px;
  opacity:0.8;
  animation-name:fluttuante;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  z-index:0;
}

@keyframes fluttuante{
  0%   {transform: translateY(0px) translateX(0px) rotate(0deg);}
  25%  {transform: translateY(20px) translateX(5px) rotate(5deg);}
  50%  {transform: translateY(40px) translateX(0px) rotate(0deg);}
  75%  {transform: translateY(20px) translateX(-5px) rotate(-5deg);}
  100% {transform: translateY(0px) translateX(0px) rotate(0deg);}
}

/* PETALI */
.petali-container{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}

.petalo{
  position:absolute;
  top:-50px;
  width:14px;
  height:20px;
  border-radius:50%;
  opacity:0.85;
  animation:caduta linear infinite;
}

@keyframes caduta{
  0%{
    transform:translateY(0) translateX(0) rotate(0deg);
    opacity:0;
  }
  10%{opacity:0.9;}
  100%{
    transform:translateY(110vh) translateX(80px) rotate(360deg);
    opacity:0;
  }
}

/* HERO */
.hero{text-align:center;padding:40px 20px;position:relative;z-index:1;}
.hero h1{font-family:'Playfair Display',serif;font-size:28px;color:white;margin-top:50px;}
.quote{font-family:'Playfair Display',serif;color:white;font-size:18px;}

/* CARD */
.card{background:white;margin:15px;padding:20px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.08);position:relative;z-index:1;}

/* INPUT */
input, select, textarea{width:100%;padding:12px;margin-top:6px;margin-bottom:12px;border-radius:10px;border:1px solid #eee;background:#FAFAFA;}
input:focus, select:focus{outline:none;border-color:var(--viola);}

/* GUEST */
.guest{background:#FFFBF7;border:1px solid #F1E6D9;padding:15px;border-radius:14px;margin-bottom:15px;position:relative;}
.remove-btn{position:absolute;top:10px;right:10px;background:#E07A5F;border:none;color:white;border-radius:6px;font-size:12px;padding:4px 8px;}
.label{font-size:13px;opacity:0.7;}

/* BOTTONI */
.bottom-bar{position:fixed;bottom:0;width:100%;display:flex;gap:10px;padding:12px;background:white;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:2;}
button{flex:1;padding:14px;border:none;border-radius:10px;}
.primary{background:var(--viola);color:white;}
.secondary{background:#eee;}
.spacer{height:100px;}
</style>
</head>
<body>

<div id="petali-container" class="petali-container"></div>
<div id="fiori-container"></div>

<div class="hero">
  <div class="quote">Quando si è felici bisogna farci caso</div>
  <h1>Federica & Eugenio</h1>
</div>

<div class="card">
  <p style="text-align:center">
    10 Ottobre 2026<br>
    Santarcangelo di Romagna<br><br>
    Cerimonia ore 11:30<br>
    Ricevimento Agriturismo Le Antiche Macine
  </p>
</div>

<div class="card">
  <h3>Conferma presenza</h3>
  <div id="guests"></div>
  <p style="text-align:center;font-size:13px;opacity:0.7;">➕ Usa il tasto sotto per aggiungere altri invitati</p>
</div>

<div class="spacer"></div>

<div class="bottom-bar">
  <button class="secondary" onclick="aggiungiInvitato()">+ Invitato</button>
  <button class="primary" onclick="invia()">Invia</button>
</div>

<!-- SCRIPT -->
<script src="config.js"></script>
<script src="main.js"></script>

</body>
</html>
